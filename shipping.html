<!DOCTYPE html>
<html lang="en">
<head>
<title>Pacific Trails Resort</title>
<meta charset="utf-8">

<link href="css/pacific.css" rel="stylesheet" type="text/css">
<script src="scripts/shop.js" defer></script>
<script src="scripts/common.js" defer></script>
<script src="scripts/shipping.js" defer></script>
<!-- Links to fonts !--><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Bungee&family=Chau+Philomene+One:ital@0;1&family=Cherry+Cream+Soda&family=Luckiest+Guy&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Shrikhand&display=swap" rel="stylesheet">
</head>
	
	
	<body onload="initShippingPage()">
    <header>
        <div class="container header-row">
            <div>
                <h1>Pacific Trails</h1>
                <p class="subtitle">Please fill out your shipping information.</p>
            </div>
            <nav class="nav-links">
                <a class="nav-button" href="gifts.html">Continue Shopping</a>
                <a class="nav-button" href="cart.html">Return to Cart</a>
            </nav>
        </div>
		
    </header>
		
		 <main class="container shipping-layout">
        <section class="shipping-card">
            <h2>Shipping Information</h2>
            <form id="shipping-form">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required>

                <label for="address">Street Address</label>
                <input type="text" id="address" required>

                <label for="city">City</label>
                <input type="text" id="city" required>

                <label for="state">State</label>
                <input type="text" id="state" required>

                <label for="zipCode">Zip Code</label>
                <input type="text" id="zipCode" required>

                <label for="notes">Delivery Notes</label>
                <textarea id="notes" rows="4"></textarea>

                <button type="submit" class="action-button primary-button">Place Simulated Order</button>
            </form>

            <div id="shipping-message"></div>
        </section>

        <section class="summary-card">
            <h2>Order Summary</h2>
            <div id="shipping-summary"></div>
        </section>
    </main>
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
	
</html>
